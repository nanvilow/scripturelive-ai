name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release:
        description: 'Publish a GitHub Release with the installer'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  build-win:
    name: Build ScriptureLive AI (Windows x64)
    runs-on: windows-latest

    defaults:
      run:
        working-directory: artifacts/imported-app

    env:
      # electron-builder reads these for code-signing. Configure them
      # under Settings → Secrets & variables → Actions if you have a
      # cert. If absent, the installer is built unsigned.
      CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
      # GH_TOKEN lets electron-builder publish the artifacts to a
      # GitHub Release so electron-updater can find them automatically.
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable pnpm via corepack
        shell: pwsh
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      # The grandiose native binding needs the Visual C++ build tools
      # plus the NDI SDK headers. windows-latest already ships with
      # MSVC 2022, so we only need the NDI SDK.
      - name: Cache NDI SDK
        id: cache-ndi
        uses: actions/cache@v4
        with:
          path: C:\NDI
          key: ndi-sdk-v6

      - name: Download NDI SDK
        if: steps.cache-ndi.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          # Public installer mirror. If this URL ever moves, update it
          # and bump the cache key above.
          $url = 'https://downloads.ndi.tv/SDK/NDI_SDK/NDI%206%20SDK.exe'
          $out = "$env:RUNNER_TEMP\NDI-SDK.exe"
          Invoke-WebRequest -Uri $url -OutFile $out
          Start-Process -FilePath $out -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART','/SP-' -Wait
          # Most installers drop the SDK in Program Files; copy a
          # known location into C:\NDI so subsequent runs cache cleanly.
          if (Test-Path 'C:\Program Files\NDI\NDI 6 SDK') {
            Copy-Item -Recurse -Force 'C:\Program Files\NDI\NDI 6 SDK' 'C:\NDI'
          }

      - name: Expose NDI SDK env vars
        shell: pwsh
        run: |
          "NDI_SDK_DIR=C:\NDI"           | Out-File -FilePath $env:GITHUB_ENV -Append
          "NDI_RUNTIME_DIR_V6=C:\NDI"    | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Build Windows installer
        run: pnpm run package:win

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScriptureLive-AI-Windows-x64
          path: artifacts/imported-app/release/*.exe
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/imported-app/release/*.exe
            artifacts/imported-app/release/latest.yml
            artifacts/imported-app/release/*.blockmap
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
