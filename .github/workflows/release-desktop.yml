name: Release ScriptureLive AI Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional tag name to publish under (defaults to v<package version>)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: package:win
            artifact_glob: "artifacts/imported-app/release/*.exe"
          - os: macos-latest
            script: package:mac
            artifact_glob: "artifacts/imported-app/release/*.dmg"
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # ---- NDI SDK install (required to compile the grandiose native binding) ----
      - name: Install NDI SDK (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          NDI_SDK_URL_WIN: ${{ secrets.NDI_SDK_URL_WIN }}
        run: |
          $url = if ($env:NDI_SDK_URL_WIN) { $env:NDI_SDK_URL_WIN } else { "https://downloads.ndi.tv/SDK/NDI_SDK/NDI%206%20SDK.exe" }
          Write-Host "Downloading NDI SDK from $url"
          Invoke-WebRequest -Uri $url -OutFile "$env:RUNNER_TEMP\ndi-sdk.exe"
          Start-Process -FilePath "$env:RUNNER_TEMP\ndi-sdk.exe" -ArgumentList "/VERYSILENT","/SUPPRESSMSGBOXES","/NORESTART","/SP-" -Wait
          # Expose for grandiose's binding.gyp
          $sdkRoot = "C:\Program Files\NDI\NDI 6 SDK"
          if (-not (Test-Path $sdkRoot)) { $sdkRoot = "C:\Program Files\NDI\NDI 5 SDK" }
          if (-not (Test-Path $sdkRoot)) { Write-Error "NDI SDK install path not found"; exit 1 }
          echo "NDI_SDK_DIR=$sdkRoot" >> $env:GITHUB_ENV
          Write-Host "NDI SDK installed at $sdkRoot"

      - name: Install NDI SDK (macOS)
        if: runner.os == 'macOS'
        env:
          NDI_SDK_URL_MAC: ${{ secrets.NDI_SDK_URL_MAC }}
        run: |
          URL="${NDI_SDK_URL_MAC:-https://downloads.ndi.tv/SDK/NDI_SDK_Mac/Install_NDI_SDK_v6_Apple.pkg}"
          echo "Downloading NDI SDK from $URL"
          curl -fsSL "$URL" -o /tmp/ndi-sdk.pkg
          sudo installer -pkg /tmp/ndi-sdk.pkg -target /
          # Locate the installed SDK and expose for grandiose
          for d in "/Library/NDI SDK for Apple" "/Library/NDI Advanced SDK for Apple"; do
            if [ -d "$d" ]; then echo "NDI_SDK_DIR=$d" >> $GITHUB_ENV; echo "Found SDK at $d"; break; fi
          done

      # ---- Install dependencies and build ----
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Next.js app
        working-directory: artifacts/imported-app
        run: pnpm run build

      - name: Compile Electron main process
        working-directory: artifacts/imported-app
        run: pnpm run electron:build

      # Two separate, OS-gated package steps so each platform only ever sees
      # its own signing secrets. Using a single step with a ternary like
      # `runner.os == 'Windows' && secrets.WIN_CSC_LINK || secrets.MAC_CSC_LINK`
      # is unsafe in GitHub Actions: if the left value is empty/unset it falls
      # through to the right side, which on a Windows runner would try to sign
      # the .exe with the macOS .p12.
      - name: Package Windows installer
        if: runner.os == 'Windows'
        working-directory: artifacts/imported-app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Authenticode signing. Build still succeeds unsigned when unset.
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: pnpm exec electron-builder --config electron-builder.yml --win --publish=never

      - name: Package macOS installer
        if: runner.os == 'macOS'
        working-directory: artifacts/imported-app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Developer ID signing. Build still succeeds unsigned when unset.
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          # Notarization (used only when CSC_LINK is also set).
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm exec electron-builder --config electron-builder.yml --mac --publish=never

      # ---- Upload as workflow artifact ----
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: installers-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(node -p "require('./artifacts/imported-app/package.json').version")
            echo "name=v${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute checksums
        run: |
          cd dist
          (cd . && for f in *; do shasum -a 256 "$f" >> SHA256SUMS.txt; done)
          cat SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ScriptureLive AI ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: |
            dist/*.exe
            dist/*.dmg
            dist/SHA256SUMS.txt
