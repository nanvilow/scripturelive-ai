name: Release ScriptureLive AI Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional tag name to publish under (defaults to v<package version>)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: package:win
            artifact_glob: "artifacts/imported-app/release/*.exe"
          - os: macos-latest
            script: package:mac
            artifact_glob: "artifacts/imported-app/release/*.dmg"
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # ---- NDI SDK install (required to compile the grandiose native binding) ----
      # Step-level timeouts prevent a single hung installer (NDI's installer
      # has popped GUI dialogs in the past) from burning the entire 6-hour
      # job budget. If install fails, the build proceeds without NDI and the
      # resulting installer simply won't expose NDI output -- end users can
      # still install NDI Tools separately.
      - name: Install NDI SDK (Windows)
        if: runner.os == 'Windows'
        timeout-minutes: 15
        continue-on-error: true
        shell: pwsh
        env:
          NDI_SDK_URL_WIN: ${{ secrets.NDI_SDK_URL_WIN }}
        run: |
          $ErrorActionPreference = "Stop"
          $url = if ($env:NDI_SDK_URL_WIN) { $env:NDI_SDK_URL_WIN } else { "https://downloads.ndi.tv/SDK/NDI_SDK/NDI%206%20SDK.exe" }
          $out = "$env:RUNNER_TEMP\ndi-sdk.exe"
          Write-Host "Downloading NDI SDK from $url"
          # Use curl.exe (built into Windows 10+) instead of Invoke-WebRequest:
          # IWR's progress bar makes 40MB downloads take 10+ minutes on CI.
          # --retry handles transient 5xx (504 Gateway Time-out is common when
          # the SDK is hosted on slow file hosts like Google Drive/Dropbox).
          & curl.exe -fsSL --max-time 300 --retry 5 --retry-delay 10 --retry-all-errors -o $out $url
          if ($LASTEXITCODE -ne 0) { throw "Download failed (curl exit $LASTEXITCODE) -- if the URL is a Google Drive/Dropbox link, switch to a GitHub Release asset URL which is CDN-backed and rarely times out" }
          $size = (Get-Item $out).Length
          Write-Host "Downloaded $size bytes"
          if ($size -lt 10000000) { throw "Downloaded file is suspiciously small ($size bytes) -- URL likely returned an HTML error page" }

          # NDI 6 SDK installer is built with Advanced Installer, which uses
          # /quiet (MSI-style), NOT /VERYSILENT (Inno Setup-style). Run it
          # in the background so PowerShell can kill it if it hangs.
          Write-Host "Running silent install with /quiet /norestart"
          $proc = Start-Process -FilePath $out -ArgumentList "/quiet","/norestart" -PassThru
          if (-not $proc.WaitForExit(600000)) {
            $proc.Kill()
            throw "NDI installer hung for 10 minutes -- killed. The installer probably popped a GUI dialog. Try downloading the SDK manually, hosting it somewhere, and setting the NDI_SDK_URL_WIN secret."
          }
          Write-Host "Installer exited with code $($proc.ExitCode)"

          # Locate the installed SDK -- v6 path, falling back to v5.
          $candidates = @(
            "C:\Program Files\NDI\NDI 6 SDK",
            "C:\Program Files\NDI\NDI 6 Advanced SDK",
            "C:\Program Files\NDI\NDI 5 SDK"
          )
          $sdkRoot = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $sdkRoot) {
            Write-Host "NDI SDK install path not found. Contents of C:\Program Files\NDI:"
            if (Test-Path "C:\Program Files\NDI") { Get-ChildItem "C:\Program Files\NDI" } else { Write-Host "(directory does not exist)" }
            throw "Could not locate installed NDI SDK"
          }
          echo "NDI_SDK_DIR=$sdkRoot" >> $env:GITHUB_ENV
          Write-Host "NDI SDK installed at $sdkRoot"

      - name: Install NDI SDK (macOS)
        if: runner.os == 'macOS'
        timeout-minutes: 15
        continue-on-error: true
        env:
          NDI_SDK_URL_MAC: ${{ secrets.NDI_SDK_URL_MAC }}
        run: |
          set -euo pipefail
          URL="${NDI_SDK_URL_MAC:-https://downloads.ndi.tv/SDK/NDI_SDK_Mac/Install_NDI_SDK_v6_Apple.pkg}"
          echo "Downloading NDI SDK from $URL"
          curl -fsSL --max-time 600 --retry 5 --retry-delay 10 --retry-all-errors "$URL" -o /tmp/ndi-sdk.pkg
          SIZE=$(stat -f%z /tmp/ndi-sdk.pkg)
          echo "Downloaded $SIZE bytes"
          file /tmp/ndi-sdk.pkg
          if [ "$SIZE" -lt 10000000 ]; then
            echo "Downloaded file is suspiciously small -- URL likely returned an HTML error page"
            head -c 500 /tmp/ndi-sdk.pkg
            exit 1
          fi
          # -verboseR surfaces the actual installer error if anything fails.
          sudo installer -verboseR -pkg /tmp/ndi-sdk.pkg -target /
          # Locate the installed SDK -- check known v6 and v5 paths.
          for d in \
            "/Library/NDI SDK for Apple" \
            "/Library/NDI Advanced SDK for Apple" \
            "/Applications/NDI 6 SDK" \
            "/Applications/NDI SDK for Apple"; do
            if [ -d "$d" ]; then
              echo "NDI_SDK_DIR=$d" >> "$GITHUB_ENV"
              echo "Found SDK at $d"
              found=1
              break
            fi
          done
          if [ -z "${found:-}" ]; then
            echo "NDI SDK install path not found. Searching for include dir..."
            sudo find /Library /Applications -maxdepth 4 -type d -name "*NDI*" 2>/dev/null || true
            exit 1
          fi

      # ---- Install dependencies and build ----
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Next.js app
        working-directory: artifacts/imported-app
        run: pnpm run build

      - name: Compile Electron main process
        working-directory: artifacts/imported-app
        run: pnpm run electron:build

      # Two separate, OS-gated package steps so each platform only ever sees
      # its own signing secrets. Using a single step with a ternary like
      # `runner.os == 'Windows' && secrets.WIN_CSC_LINK || secrets.MAC_CSC_LINK`
      # is unsafe in GitHub Actions: if the left value is empty/unset it falls
      # through to the right side, which on a Windows runner would try to sign
      # the .exe with the macOS .p12.
      - name: Package Windows installer
        if: runner.os == 'Windows'
        working-directory: artifacts/imported-app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Authenticode signing. Build still succeeds unsigned when unset.
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: pnpm exec electron-builder --config electron-builder.yml --win --publish=never

      - name: Package macOS installer
        if: runner.os == 'macOS'
        working-directory: artifacts/imported-app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Developer ID signing. Build still succeeds unsigned when unset.
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          # Notarization (used only when CSC_LINK is also set).
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm exec electron-builder --config electron-builder.yml --mac --publish=never

      # ---- Upload as workflow artifact ----
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: installers-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(node -p "require('./artifacts/imported-app/package.json').version")
            echo "name=v${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute checksums
        run: |
          cd dist
          (cd . && for f in *; do shasum -a 256 "$f" >> SHA256SUMS.txt; done)
          cat SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ScriptureLive AI ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: |
            dist/*.exe
            dist/*.dmg
            dist/SHA256SUMS.txt
