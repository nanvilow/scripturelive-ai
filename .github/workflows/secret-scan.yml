name: Secret scan

# Runs gitleaks on every push and PR so a leaked credential is blocked
# before it can reach `main` (and before it can break the desktop release
# pipeline the way the v0.7.32 OpenAI key leak did — see `replit.md`).
#
# This is the *server-side* guard. Contributors also get a local pre-commit
# hook that runs the same scanner with the same config (see `.githooks/`
# and the `prepare` script in the root `package.json`); CI is the
# authoritative gate that catches anything that slipped past local hooks.

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      # `fetch-depth: 0` so gitleaks can scan the full pushed history,
      # not just the latest commit. On PRs this lets it diff every commit
      # in the branch, not only the merge commit.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Install the gitleaks CLI directly from the upstream release rather
      # than using `gitleaks/gitleaks-action@v2`. The action requires a
      # paid license for org-owned private repos; the raw CLI is MIT and
      # works the same way for our use case.
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.21.2"
        run: |
          set -euo pipefail
          curl -fsSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      # `--gitleaks-ignore-path` is passed explicitly so the accepted
      # historical fingerprints in `.gitleaksignore` are honored
      # deterministically across gitleaks versions, even if upstream
      # changes the auto-discovery rules in a future release.
      - name: Scan repository history
        run: |
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --gitleaks-ignore-path .gitleaksignore \
            --redact \
            --no-banner \
            --verbose \
            --exit-code 1
