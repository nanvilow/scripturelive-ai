kind = "web"
  previewPath = "/"
  title = "Imported App"
  version = "1.0.0"
  id = "artifacts/imported-app"
  router = "path"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  name = "web"
  paths = [ "/api", "/" ]
  localPort = 25650

  [services.development]
  run = "pnpm --filter @workspace/imported-app run dev"

  [services.production]

  [services.production.build]
  args = ["pnpm", "--filter", "@workspace/imported-app", "run", "build"]

  [services.production.build.env]
  NODE_ENV = "production"
  # Cloud Run autoscale build runner is `cr-2-4` (2 vCPU, 4 GB RAM).
  # See artifacts/imported-app/DEPLOY.md for the full breakdown of how
  # the four memory levers (dep prune, marketing-prebuild skip, V8
  # heap cap, webpack experimentals) keep the Next 16 webpack build
  # inside the 4 GB cgroup. The user-side escape hatch when this app
  # outgrows cr-2-4 is bumping the build resources to cr-4-8 in the
  # Replit deployment pane.
  #
  # SKIP_MARKETING_PREBUILD: short-circuits scripts/maybe-build-
  # marketing.mjs so we don't run the @workspace/site Vite build
  # back-to-back with the Next webpack build on the same VM. The
  # scriptureliveai.com host rewrite falls through to Next's default
  # response while the marketing site is wired into the Replit-level
  # proxy as a separate artifact in a follow-up. Local desktop builds
  # (BUILD.bat / package:win / package:mac) leave this unset, so the
  # Electron .exe still ships with the bundled marketing SPA.
  #
  # NODE_OPTIONS: caps V8's old-space heap at 3584 MB, leaving ~512 MB
  # of cgroup headroom for native allocs (SWC, Prisma generate,
  # terser). The matching webpack memory knobs (cpus=1,
  # webpackMemoryOptimizations) live in next.config.ts.
  SKIP_MARKETING_PREBUILD = "1"
  NODE_OPTIONS = "--max-old-space-size=3584"
  NEXT_TELEMETRY_DISABLED = "1"

  [services.production.run]
  args = ["pnpm", "--filter", "@workspace/imported-app", "run", "start"]

  [services.production.run.env]
  PORT = "25650"
  NODE_ENV = "production"

  [services.env]
  PORT = "25650"
  BASE_PATH = "/"
