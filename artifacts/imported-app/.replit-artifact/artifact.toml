kind = "web"
  previewPath = "/"
  title = "Imported App"
  version = "1.0.0"
  id = "artifacts/imported-app"
  router = "path"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  name = "web"
  paths = [ "/api", "/" ]
  localPort = 25650

  [services.development]
  run = "pnpm --filter @workspace/imported-app run dev"

  [services.production]

  [services.production.build]
  args = ["pnpm", "--filter", "@workspace/imported-app", "run", "build"]

  [services.production.build.env]
  NODE_ENV = "production"
  # Cloud Run autoscale build runner is `cr-2-4` (2 vCPU, 4 GB RAM).
  # See artifacts/imported-app/DEPLOY.md for the full breakdown of how
  # the memory levers (heavy-dep audit by Task #92, V8 heap cap,
  # webpack experimentals, terser disable) keep the Next 16 webpack
  # build inside the 4 GB cgroup. The user-side escape hatch when
  # this app outgrows cr-2-4 is bumping the build resources to
  # cr-4-8 in the Replit deployment pane.
  #
  # NODE_OPTIONS: caps V8's old-space heap at 2048 MB. 2048 is the
  # smallest heap that still fits Next's module graph for this app,
  # leaving ~2 GB of cgroup headroom for native allocs (SWC, Prisma
  # generate) on a 4 GB runner.
  #
  # DISABLE_MINIFY: hard-disables webpack's terser pass via the
  # callback in next.config.ts. Terser is the single most memory-
  # intensive build step (each parallel worker holds the full
  # module AST in RAM). With it off the client bundle is unminified
  # — gzip still cuts ~70% off transfer size at Cloud Run's edge,
  # so the user-visible effect is negligible. Remove this once the
  # app is on cr-4-8.
  #
  # SKIP_MARKETING_PREBUILD removed in v0.7.34 — the marketing site
  # at scriptureliveai.com is moving to its own standalone Replit
  # project, so this artifact no longer touches @workspace/site.
  # The companion `[deployment.build]` hook in `.replit` now invokes
  # a no-op stub (see scripts/maybe-build-marketing.mjs); the hook
  # line can be deleted from `.replit` via the Files pane to fully
  # excise it.
  NODE_OPTIONS = "--max-old-space-size=3072"
  DISABLE_MINIFY = "1"
  NEXT_TELEMETRY_DISABLED = "1"

  [services.production.run]
  args = ["pnpm", "--filter", "@workspace/imported-app", "run", "start"]

  [services.production.run.env]
  PORT = "25650"
  NODE_ENV = "production"

  [services.env]
  PORT = "25650"
  BASE_PATH = "/"
