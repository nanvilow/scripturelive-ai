kind = "web"
  previewPath = "/"
  title = "Imported App"
  version = "1.0.0"
  id = "artifacts/imported-app"
  router = "path"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  name = "web"
  paths = [ "/api", "/" ]
  localPort = 25650

  [services.development]
  run = "pnpm --filter @workspace/imported-app run dev"

  [services.production]

  [services.production.build]
  args = ["pnpm", "--filter", "@workspace/imported-app", "run", "build"]

  [services.production.build.env]
  NODE_ENV = "production"
  # v0.7.36 — Build VM has ~4 GB usable RAM. V8 old-space cap of 3072 MB
  # leaves ~1 GB headroom for native allocations from SWC/webpack/terser
  # plus V8 young-gen + code-space + Node overhead. 8192 was too high
  # (V8 deferred GC and kernel SIGKILL'd at ~6 GB), 3584 was still
  # marginal (peaked ~4.5 GB), 3072 should sit safely under the cgroup.
  #
  # Note: --gc-interval is REJECTED by Node 24 in NODE_OPTIONS for
  # security reasons ("--gc-interval= is not allowed in NODE_OPTIONS").
  # Only --max-old-space-size is allowed via this env var.
  #
  # If this still OOMs, next escalation is cap=2560 MB combined with
  # disabling SWC minification in next.config.ts.
  NODE_OPTIONS = "--max-old-space-size=3072"
  NEXT_TELEMETRY_DISABLED = "1"

  [services.production.run]
  args = ["pnpm", "--filter", "@workspace/imported-app", "run", "start"]

  [services.production.run.env]
  PORT = "25650"
  NODE_ENV = "production"

  [services.env]
  PORT = "25650"
  BASE_PATH = "/"
