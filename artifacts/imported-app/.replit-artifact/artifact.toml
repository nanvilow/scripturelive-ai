kind = "web"
  previewPath = "/"
  title = "Imported App"
  version = "1.0.0"
  id = "artifacts/imported-app"
  router = "path"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  name = "web"
  paths = [ "/api", "/" ]
  localPort = 25650

  [services.development]
  run = "pnpm --filter @workspace/imported-app run dev"

  [services.production]

  [services.production.build]
  args = ["pnpm", "--filter", "@workspace/imported-app", "run", "build"]

  [services.production.build.env]
  NODE_ENV = "production"
  # v0.7.37 — Cloud Run build runner is cr-2-4 (2 vCPU, 4 GB RAM).
  # Confirmed via getDeploymentBuild on both the last successful build
  # (Turbopack, smaller app) and the SIGKILL'd webpack builds. The
  # webpack build won't fit in 4 GB at any heap >= 3072. We drop V8
  # cap to 2048 MB AND disable terser minification in next.config.ts
  # (the single biggest memory consumer in webpack production builds).
  # Combined headroom: ~2 GB for V8 + ~2 GB for native allocs (SWC,
  # Prisma generate, etc.) = fits comfortably in 4 GB cgroup.
  #
  # Trade-off: client bundle is unminified. Acceptable for shipping
  # the deploy; once live the user can bump build resources to cr-4-8
  # in the Replit deployment pane and re-enable terser by reverting
  # the webpack callback in next.config.ts.
  NODE_OPTIONS = "--max-old-space-size=2048"
  NEXT_TELEMETRY_DISABLED = "1"

  [services.production.run]
  args = ["pnpm", "--filter", "@workspace/imported-app", "run", "start"]

  [services.production.run.env]
  PORT = "25650"
  NODE_ENV = "production"

  [services.env]
  PORT = "25650"
  BASE_PATH = "/"
