kind = "web"
  previewPath = "/"
  title = "Imported App"
  version = "1.0.0"
  id = "artifacts/imported-app"
  router = "path"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  name = "web"
  paths = [ "/api", "/" ]
  localPort = 25650

  [services.development]
  run = "pnpm --filter @workspace/imported-app run dev"

  [services.production]

  [services.production.build]
  args = ["pnpm", "--filter", "@workspace/imported-app", "run", "build"]

  [services.production.build.env]
  NODE_ENV = "production"
  # Cloud Run autoscale build runner is `cr-2-4` (2 vCPU, 4 GB RAM).
  # See artifacts/imported-app/DEPLOY.md for the full breakdown of how
  # the memory levers (heavy-dep audit by Task #92, V8 heap cap,
  # webpack experimentals, terser disable) keep the Next 16 webpack
  # build inside the 4 GB cgroup. The user-side escape hatch when
  # this app outgrows cr-2-4 is bumping the build resources to
  # cr-4-8 in the Replit deployment pane.
  #
  # NODE_OPTIONS: caps V8's old-space heap. Sized in coordination
  # with the next.config.ts `output: "standalone"` decision because
  # standalone tracing dominates native (off-heap) memory while
  # webpack optimization dominates V8 heap memory.
  #
  #   v0.7.34: heap=2048 MB. Standalone ON. Failed: webpack ran out
  #            of V8 heap during optimization with status 1.
  #   v0.7.36: heap=3072 MB. Standalone ON. Failed: cgroup SIGKILL
  #            (exit 137) during the standalone trace step — native
  #            memory exceeded the cgroup even though V8 had headroom.
  #   v0.7.38: heap=3072 MB. Standalone OFF on Cloud Run (Electron
  #            still gets it via NEXT_OUTPUT_STANDALONE=1 set by the
  #            `package*` scripts in package.json). Failed: status 1
  #            during optimization — got past the cgroup but webpack
  #            still ran out of V8 heap.
  #   v0.7.39: heap=3584 MB. Standalone OFF. Standalone is the heavy
  #            native consumer; with it gone, the cgroup safely has
  #            ~512 MB native headroom for SWC + Prisma generate +
  #            kernel even at heap=3584. This gives webpack ~512 MB
  #            more V8 heap than v0.7.38 — should clear the
  #            optimization-phase OOM that v0.7.38 hit.
  #
  # DISABLE_MINIFY: hard-disables webpack's terser pass via the
  # callback in next.config.ts. Terser is the single most memory-
  # intensive build step (each parallel worker holds the full
  # module AST in RAM). With it off the client bundle is unminified
  # — gzip still cuts ~70% off transfer size at Cloud Run's edge,
  # so the user-visible effect is negligible. Remove this once the
  # app is on cr-4-8.
  #
  # SKIP_MARKETING_PREBUILD removed in v0.7.34 — the marketing site
  # at scriptureliveai.com is moving to its own standalone Replit
  # project, so this artifact no longer touches @workspace/site.
  # The companion `[deployment.build]` hook in `.replit` now invokes
  # a no-op stub (see scripts/maybe-build-marketing.mjs); the hook
  # line can be deleted from `.replit` via the Files pane to fully
  # excise it.
  NODE_OPTIONS = "--max-old-space-size=3584"
  DISABLE_MINIFY = "1"
  NEXT_TELEMETRY_DISABLED = "1"

  [services.production.run]
  args = ["pnpm", "--filter", "@workspace/imported-app", "run", "start"]

  [services.production.run.env]
  PORT = "25650"
  NODE_ENV = "production"

  [services.env]
  PORT = "25650"
  BASE_PATH = "/"
