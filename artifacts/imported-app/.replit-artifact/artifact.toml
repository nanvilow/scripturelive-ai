kind = "web"
  previewPath = "/"
  title = "Imported App"
  version = "1.0.0"
  id = "artifacts/imported-app"
  router = "path"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  name = "web"
  paths = [ "/api", "/" ]
  localPort = 25650

  [services.development]
  run = "pnpm --filter @workspace/imported-app run dev"

  [services.production]

  [services.production.build]
  args = ["pnpm", "--filter", "@workspace/imported-app", "run", "build"]

  [services.production.build.env]
  NODE_ENV = "production"
  # v0.7.35 — Cloud Run build still SIGKILL'd at heap=3584 MB, so we
  # drop further per architect's fallback advice. The build VM total
  # RSS = V8 old-space (capped here) + V8 young/code (~150 MB) +
  # native allocs by SWC/webpack/terser (~600 MB) + Node overhead
  # (~100 MB). At cap=3584 we were peaking ~4.5 GB on a ~4 GB cgroup.
  # cap=3072 leaves enough headroom for the native side.
  #
  # --gc-interval=100 forces V8 to run GC more frequently regardless
  # of heap pressure (every 100 allocations vs adaptive). Trades a
  # few % build time for a much steadier RSS curve.
  #
  # If this still OOMs, next step is cap=2560 + disabling SWC
  # minification via swcMinify:false in next.config.ts.
  NODE_OPTIONS = "--max-old-space-size=3072 --gc-interval=100"
  NEXT_TELEMETRY_DISABLED = "1"

  [services.production.run]
  args = ["pnpm", "--filter", "@workspace/imported-app", "run", "start"]

  [services.production.run.env]
  PORT = "25650"
  NODE_ENV = "production"

  [services.env]
  PORT = "25650"
  BASE_PATH = "/"
